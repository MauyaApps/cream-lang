<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download — Cream Language</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com" rel="stylesheet"/>
</head>
<body>
  <div class="scanlines"></div><div class="noise"></div>
  <nav>
    <button class="nav-burger" aria-label="Menu"><span></span><span></span><span></span></button>
    <a href="index.html" class="nav-logo"><span class="logo-bracket">[</span>cream<span class="logo-bracket">]</span></a>
    <div class="nav-links">
      <a href="index.html" data-en="Home" data-ru="Главная">Home</a>
      <a href="docs.html" data-en="Docs" data-ru="Документация">Docs</a>
      <a href="examples.html" data-en="Examples" data-ru="Примеры">Examples</a>
      <a href="download.html" class="active" data-en="Download" data-ru="Скачать">Download</a>
      <a href="faq.html">FAQ</a>
      <a href="guide.html" data-en="Guide PDF" data-ru="Гайд PDF">Guide PDF</a>
      <button class="lang-toggle" onclick="toggleLang()">RU</button>
    </div>
  </nav>

  <div class="dl-wrap">
    <h1 data-en="Download Cream" data-ru="Скачать Cream">Download Cream</h1>
    <div class="version-badge">latest stable — v0.2.2</div>

    <div class="dl-picker">
      <!-- OS -->
      <div>
        <div class="dl-group-label" data-en="Operating System" data-ru="Операционная система">Operating System</div>
        <div class="dl-options">
          <label class="dl-option selected" id="os-windows">
            <input type="radio" name="os" value="windows" checked onchange="updateBtn()"/>
            <span class="dl-option-icon">🪟</span>
            <div><div class="dl-option-text">Windows</div><div class="dl-option-sub">x64 · .exe</div></div>
          </label>
          <label class="dl-option" id="os-linux">
            <input type="radio" name="os" value="linux" onchange="updateBtn()"/>
            <span class="dl-option-icon">🐧</span>
            <div><div class="dl-option-text">Linux</div><div class="dl-option-sub">x64 · binary</div></div>
          </label>
          <label class="dl-option" id="os-macos">
            <input type="radio" name="os" value="macos" onchange="updateBtn()"/>
            <span class="dl-option-icon">🍎</span>
            <div><div class="dl-option-text">macOS</div><div class="dl-option-sub">x64 / ARM</div></div>
          </label>
          <label class="dl-option" id="os-android">
            <input type="radio" name="os" value="android" onchange="updateBtn()"/>
            <span class="dl-option-icon">🤖</span>
            <div><div class="dl-option-text">Android</div><div class="dl-option-sub">API 24+ · .apk</div></div>
          </label>
        </div>
      </div>

      <!-- Version -->
      <div>
        <div class="dl-group-label" data-en="Version" data-ru="Версия">Version</div>
        <div class="dl-options">
          <label class="dl-option selected">
            <input type="radio" name="ver" value="0.2.2" checked onchange="updateBtn()"/>
            <span class="dl-option-icon">⭐</span>
            <div><div class="dl-option-text">v0.2.2</div><div class="dl-option-sub" data-en="Latest stable" data-ru="Последняя стабильная">Latest stable</div></div>
          </label>
          <label class="dl-option">
            <input type="radio" name="ver" value="0.2.1" onchange="updateBtn()"/>
            <span class="dl-option-icon">📦</span>
            <div><div class="dl-option-text">v0.2.1</div><div class="dl-option-sub" data-en="Previous release" data-ru="Предыдущий релиз">Previous release</div></div>
          </label>
          <label class="dl-option">
            <input type="radio" name="ver" value="0.1.1" onchange="updateBtn()"/>
            <span class="dl-option-icon">🗂</span>
            <div><div class="dl-option-text">v0.1.1</div><div class="dl-option-sub" data-en="Archive" data-ru="Архив">Archive</div></div>
          </label>
          <label class="dl-option">
            <input type="radio" name="ver" value="0.1.0" onchange="updateBtn()"/>
            <span class="dl-option-icon">🗂</span>
            <div><div class="dl-option-text">v0.1.0</div><div class="dl-option-sub" data-en="Archive · Windows only" data-ru="Архив · только Windows">Archive · Windows only</div></div>
          </label>
        </div>
      </div>
    </div>

    <div class="dl-btn-wrap">
      <button id="dl-btn" onclick="doDownload()">
        ↓ <span id="dl-label">Download cream-0.2.2-windows.exe</span>
      </button>
    </div>

    <hr class="dl-divider"/>
    <a href="https://github.com" class="btn-primary" target="_blank">
        <span data-en="All Releases" data-ru="Все релизы">All Releases</span> →
    </a>
  </div>

  <script src="nav.js"></script>
  <script>
    const RELEASE_BASE = 'https://github.com/download';
    const EXT = { windows: '.exe', linux: '', macos: '', android: '.apk' };
    const WINDOWS_ONLY = ['0.1.0', '0.1.1', '0.2.1'];

    function getOS() { return document.querySelector('input[name="os"]:checked')?.value || 'windows'; }
    function getVer() { return document.querySelector('input[name="ver"]:checked')?.value || '0.2.2'; }

    function updateBtn() {
      const ver = getVer();
      const os = getOS();
      const btn = document.getElementById('dl-btn');
      const label = document.getElementById('dl-label');

      // Визуальное выделение выбранной опции
      document.querySelectorAll('.dl-option').forEach(opt => opt.classList.remove('selected'));
      document.querySelectorAll('input:checked').forEach(input => input.parentElement.classList.add('selected'));

      let filename = "";
      if (os === 'android') {
        filename = "app-release.apk"; // Ваше имя файла в GitHub
      } else {
        filename = `cream-${ver}-${os}${EXT[os]}`;
      }

      label.innerText = `Download ${filename}`;

      // Проверка на доступность версии для выбранной ОС
      if (WINDOWS_ONLY.includes(ver) && os !== 'windows') {
        btn.disabled = true;
        label.innerText = "Not available for this OS";
      } else {
        btn.disabled = false;
      }
    }

    function doDownload() {
      const ver = getVer();
      const os = getOS();
      let filename = (os === 'android') ? "app-release.apk" : `cream-${ver}-${os}${EXT[os]}`;
      
      const finalUrl = `${RELEASE_BASE}/v${ver}/${filename}`;
      window.location.href = finalUrl;
    }

    // Запуск при загрузке
    window.onload = updateBtn;
  </script>
</body>
</html>
