name: Build Cream

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:

  # ── Windows ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller pyqt6

      - name: Build cream.exe
        run: pyinstaller --onefile --noconsole --icon=cream.ico --name=cream cream.py

      - name: Build cream-ide-windows.exe
        run: pyinstaller --onefile --noconsole --icon=cream.ico --name=cream-ide-windows cream_ide_standalone.py

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/cream.exe
            dist/cream-ide-windows.exe

  # ── Linux ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          sudo apt-get install -y python3-pyqt6

      - name: Build cream-linux
        run: pyinstaller --onefile --name=cream-linux cream.py

      - name: Build cream-ide-linux
        run: pyinstaller --onefile --name=cream-ide-linux cream_ide_standalone.py

      - name: Make executable
        run: |
          chmod +x dist/cream-linux
          chmod +x dist/cream-ide-linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/cream-linux
            dist/cream-ide-linux

  # ── macOS ─────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pyqt6

      - name: Build cream-macos
        run: pyinstaller --onefile --name=cream-macos cream.py

      - name: Build cream-ide-macos
        run: pyinstaller --onefile --name=cream-ide-macos cream_ide_standalone.py

      - name: Make executable
        run: |
          chmod +x dist/cream-macos
          chmod +x dist/cream-ide-macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/cream-macos
            dist/cream-ide-macos

  # ── Release ───────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cream ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: |
            windows-build/cream.exe
            windows-build/cream-ide-windows.exe
            linux-build/cream-linux
            linux-build/cream-ide-linux
            macos-build/cream-macos
            macos-build/cream-ide-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
