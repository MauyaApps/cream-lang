name: Build Cream

on:
  release:
    types: [ created ]
  workflow_dispatch:

jobs:

  # ══════════════════════════════════════════
  #  Windows — cream.exe + cream-ide.exe
  # ══════════════════════════════════════════
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller PyQt6

      - name: Build cream.exe
        run: pyinstaller --onefile --name cream cream.py

      - name: Build cream-ide.exe
        run: pyinstaller --onefile --noconsole --name cream-ide cream_ide_standalone.py

      - name: Upload cream
        uses: actions/upload-artifact@v4
        with:
          name: cream-windows
          path: dist/cream.exe

      - name: Upload cream-ide
        uses: actions/upload-artifact@v4
        with:
          name: cream-ide-windows
          path: dist/cream-ide.exe

  # ══════════════════════════════════════════
  #  Linux — cream + cream-ide
  # ══════════════════════════════════════════
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0

      - name: Build cream
        run: pyinstaller --onefile --name cream cream.py

      - name: Build cream-ide
        run: pyinstaller --onefile --noconsole --name cream-ide cream_ide_standalone.py

      - name: Upload cream
        uses: actions/upload-artifact@v4
        with:
          name: cream-linux
          path: dist/cream

      - name: Upload cream-ide
        uses: actions/upload-artifact@v4
        with:
          name: cream-ide-linux
          path: dist/cream-ide

  # ══════════════════════════════════════════
  #  macOS — cream + cream-ide
  # ══════════════════════════════════════════
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller PyQt6

      - name: Build cream
        run: pyinstaller --onefile --name cream cream.py

      - name: Build cream-ide
        run: pyinstaller --onefile --noconsole --name cream-ide cream_ide_standalone.py

      - name: Upload cream
        uses: actions/upload-artifact@v4
        with:
          name: cream-macos
          path: dist/cream

      - name: Upload cream-ide
        uses: actions/upload-artifact@v4
        with:
          name: cream-ide-macos
          path: dist/cream-ide

  # ══════════════════════════════════════════
  #  Публикация релиза
  # ══════════════════════════════════════════
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/

      - name: Prepare release files
        run: |
          mkdir -p final
          cp release/cream-windows/cream.exe        final/cream-windows.exe
          cp release/cream-linux/cream               final/cream-linux
          cp release/cream-macos/cream               final/cream-macos
          cp release/cream-ide-windows/cream-ide.exe final/cream-ide-windows.exe
          cp release/cream-ide-linux/cream-ide        final/cream-ide-linux
          cp release/cream-ide-macos/cream-ide        final/cream-ide-macos
          chmod +x final/cream-linux final/cream-macos
          chmod +x final/cream-ide-linux final/cream-ide-macos
          ls -la final/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            final/cream-windows.exe
            final/cream-linux
            final/cream-macos
            final/cream-ide-windows.exe
            final/cream-ide-linux
            final/cream-ide-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
